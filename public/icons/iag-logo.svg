<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#0b1628"/>

  <!-- La hoja emerge SOLO de la red: nodos y conexiones, sin relleno sólido -->
  <!-- Nodo raíz / tallo -->
  <line x1="100" y1="185" x2="100" y2="160" stroke="#3dbb6e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nodos principales de la estructura de hoja -->
  <!-- Nivel 1: base hoja -->
  <circle cx="100" cy="158" r="4.5" fill="#3dbb6e"/>
  <!-- Nivel 2 -->
  <circle cx="78"  cy="142" r="4"   fill="#e2b04a"/>
  <circle cx="100" cy="138" r="4"   fill="#e2b04a"/>
  <circle cx="122" cy="142" r="4"   fill="#e2b04a"/>
  <!-- Nivel 3 -->
  <circle cx="60"  cy="122" r="3.5" fill="#3dbb6e"/>
  <circle cx="84"  cy="118" r="3.5" fill="#e2b04a"/>
  <circle cx="100" cy="116" r="4"   fill="#e2b04a"/>
  <circle cx="116" cy="118" r="3.5" fill="#e2b04a"/>
  <circle cx="140" cy="122" r="3.5" fill="#3dbb6e"/>
  <!-- Nivel 4 -->
  <circle cx="46"  cy="100" r="3"   fill="#3dbb6e"/>
  <circle cx="68"  cy="96"  r="3.5" fill="#e2b04a"/>
  <circle cx="88"  cy="94"  r="3.5" fill="#e2b04a"/>
  <circle cx="100" cy="92"  r="4.5" fill="#e2b04a"/>
  <circle cx="112" cy="94"  r="3.5" fill="#e2b04a"/>
  <circle cx="132" cy="96"  r="3.5" fill="#e2b04a"/>
  <circle cx="154" cy="100" r="3"   fill="#3dbb6e"/>
  <!-- Nivel 5 -->
  <circle cx="55"  cy="76"  r="3"   fill="#3dbb6e"/>
  <circle cx="74"  cy="72"  r="3.5" fill="#e2b04a"/>
  <circle cx="92"  cy="70"  r="3.5" fill="#e2b04a"/>
  <circle cx="100" cy="68"  r="4"   fill="#e2b04a"/>
  <circle cx="108" cy="70"  r="3.5" fill="#e2b04a"/>
  <circle cx="126" cy="72"  r="3.5" fill="#e2b04a"/>
  <circle cx="145" cy="76"  r="3"   fill="#3dbb6e"/>
  <!-- Nivel 6 (estrecho, cerca de punta) -->
  <circle cx="68"  cy="52"  r="3"   fill="#3dbb6e"/>
  <circle cx="84"  cy="48"  r="3.5" fill="#e2b04a"/>
  <circle cx="100" cy="44"  r="4"   fill="#e2b04a"/>
  <circle cx="116" cy="48"  r="3.5" fill="#e2b04a"/>
  <circle cx="132" cy="52"  r="3"   fill="#3dbb6e"/>
  <!-- Punta -->
  <circle cx="100" cy="26"  r="5"   fill="#e2b04a"/>

  <!-- Conexiones: vena central -->
  <line x1="100" y1="158" x2="100" y2="138" stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>
  <line x1="100" y1="138" x2="100" y2="116" stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>
  <line x1="100" y1="116" x2="100" y2="92"  stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>
  <line x1="100" y1="92"  x2="100" y2="68"  stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>
  <line x1="100" y1="68"  x2="100" y2="44"  stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>
  <line x1="100" y1="44"  x2="100" y2="26"  stroke="#e2b04a" stroke-width="1.8" opacity="0.7"/>

  <!-- Conexiones: venas laterales (simétricas) -->
  <line x1="100" y1="158" x2="78"  y2="142" stroke="#3dbb6e" stroke-width="1.4" opacity="0.6"/>
  <line x1="100" y1="158" x2="122" y2="142" stroke="#3dbb6e" stroke-width="1.4" opacity="0.6"/>
  <line x1="78"  y1="142" x2="60"  y2="122" stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="122" y1="142" x2="140" y2="122" stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="100" y1="138" x2="84"  y2="118" stroke="#e2b04a" stroke-width="1.3" opacity="0.5"/>
  <line x1="100" y1="138" x2="116" y2="118" stroke="#e2b04a" stroke-width="1.3" opacity="0.5"/>
  <line x1="60"  y1="122" x2="46"  y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <line x1="140" y1="122" x2="154" y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <line x1="84"  y1="118" x2="68"  y2="96"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="116" y1="118" x2="132" y2="96"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="116" x2="88"  y2="94"  stroke="#e2b04a" stroke-width="1.2" opacity="0.45"/>
  <line x1="100" y1="116" x2="112" y2="94"  stroke="#e2b04a" stroke-width="1.2" opacity="0.45"/>
  <line x1="46"  y1="100" x2="55"  y2="76"  stroke="#3dbb6e" stroke-width="1.1" opacity="0.45"/>
  <line x1="154" y1="100" x2="145" y2="76"  stroke="#3dbb6e" stroke-width="1.1" opacity="0.45"/>
  <line x1="68"  y1="96"  x2="74"  y2="72"  stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="132" y1="96"  x2="126" y2="72"  stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="88"  y1="94"  x2="92"  y2="70"  stroke="#e2b04a" stroke-width="1.1" opacity="0.4"/>
  <line x1="112" y1="94"  x2="108" y2="70"  stroke="#e2b04a" stroke-width="1.1" opacity="0.4"/>
  <line x1="55"  y1="76"  x2="68"  y2="52"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="145" y1="76"  x2="132" y2="52"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="74"  y1="72"  x2="84"  y2="48"  stroke="#e2b04a" stroke-width="1"   opacity="0.4"/>
  <line x1="126" y1="72"  x2="116" y2="48"  stroke="#e2b04a" stroke-width="1"   opacity="0.4"/>
  <line x1="84"  y1="48"  x2="100" y2="44"  stroke="#e2b04a" stroke-width="1"   opacity="0.4"/>
  <line x1="116" y1="48"  x2="100" y2="44"  stroke="#e2b04a" stroke-width="1"   opacity="0.4"/>
  <line x1="68"  y1="52"  x2="84"  y2="48"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="132" y1="52"  x2="116" y2="48"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>

  <!-- Halo sutil en punta -->
  <circle cx="100" cy="26" r="10" stroke="#e2b04a" stroke-width="1" opacity="0.25" fill="none"/>
</svg>
