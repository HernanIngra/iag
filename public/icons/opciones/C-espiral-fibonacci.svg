<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#080f1e"/>

  <!-- Espiral de Fibonacci / filotaxis vegetal -->
  <!-- Nodos colocados siguiendo distribución espiral (ángulo dorado ~137.5°) -->

  <!-- Nodo central -->
  <circle cx="100" cy="100" r="7" fill="#e2b04a"/>

  <!-- Capa 1 (radio ~18) -->
  <circle cx="100" cy="82"  r="4.5" fill="#e2b04a"/>
  <circle cx="115" cy="107" r="4.5" fill="#e2b04a"/>
  <circle cx="87"  cy="116" r="4.5" fill="#e2b04a"/>

  <!-- Conexiones capa 1 -->
  <line x1="100" y1="100" x2="100" y2="82"  stroke="#e2b04a" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="115" y2="107" stroke="#e2b04a" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="87"  y2="116" stroke="#e2b04a" stroke-width="1.5" opacity="0.6"/>

  <!-- Capa 2 (radio ~32) -->
  <circle cx="110" cy="69"  r="4"   fill="#3dbb6e"/>
  <circle cx="132" cy="88"  r="4"   fill="#3dbb6e"/>
  <circle cx="130" cy="118" r="4"   fill="#3dbb6e"/>
  <circle cx="100" cy="132" r="4"   fill="#3dbb6e"/>
  <circle cx="70"  cy="120" r="4"   fill="#3dbb6e"/>
  <circle cx="68"  cy="88"  r="4"   fill="#3dbb6e"/>

  <!-- Conexiones capa 1 → 2 -->
  <line x1="100" y1="82"  x2="110" y2="69"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="100" y1="82"  x2="68"  y2="88"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="115" y1="107" x2="132" y2="88"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="115" y1="107" x2="130" y2="118" stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="87"  y1="116" x2="100" y2="132" stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>
  <line x1="87"  y1="116" x2="70"  y2="120" stroke="#3dbb6e" stroke-width="1.3" opacity="0.55"/>

  <!-- Capa 3 (radio ~52) -->
  <circle cx="100" cy="48"  r="3.5" fill="#e2b04a"/>
  <circle cx="130" cy="56"  r="3.5" fill="#e2b04a"/>
  <circle cx="152" cy="78"  r="3.5" fill="#e2b04a"/>
  <circle cx="152" cy="108" r="3.5" fill="#e2b04a"/>
  <circle cx="136" cy="140" r="3.5" fill="#e2b04a"/>
  <circle cx="108" cy="155" r="3.5" fill="#e2b04a"/>
  <circle cx="76"  cy="152" r="3.5" fill="#e2b04a"/>
  <circle cx="50"  cy="134" r="3.5" fill="#e2b04a"/>
  <circle cx="46"  cy="104" r="3.5" fill="#e2b04a"/>
  <circle cx="54"  cy="72"  r="3.5" fill="#e2b04a"/>
  <circle cx="76"  cy="52"  r="3.5" fill="#e2b04a"/>

  <!-- Conexiones capa 2 → 3 -->
  <line x1="110" y1="69"  x2="100" y2="48"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="110" y1="69"  x2="130" y2="56"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="132" y1="88"  x2="152" y2="78"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="130" y1="118" x2="152" y2="108" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="130" y1="118" x2="136" y2="140" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="132" x2="108" y2="155" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="70"  y1="120" x2="76"  y2="152" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="70"  y1="120" x2="50"  y2="134" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="68"  y1="88"  x2="46"  y2="104" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="68"  y1="88"  x2="54"  y2="72"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="110" y1="69"  x2="76"  y2="52"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>

  <!-- Capa 4 exterior (radio ~74) -->
  <circle cx="100" cy="26"  r="3"   fill="#3dbb6e"/>
  <circle cx="138" cy="36"  r="3"   fill="#3dbb6e"/>
  <circle cx="168" cy="62"  r="3"   fill="#3dbb6e"/>
  <circle cx="174" cy="100" r="3"   fill="#3dbb6e"/>
  <circle cx="160" cy="140" r="3"   fill="#3dbb6e"/>
  <circle cx="130" cy="168" r="3"   fill="#3dbb6e"/>
  <circle cx="90"  cy="176" r="3"   fill="#3dbb6e"/>
  <circle cx="52"  cy="164" r="3"   fill="#3dbb6e"/>
  <circle cx="28"  cy="136" r="3"   fill="#3dbb6e"/>
  <circle cx="24"  cy="98"  r="3"   fill="#3dbb6e"/>
  <circle cx="40"  cy="60"  r="3"   fill="#3dbb6e"/>
  <circle cx="66"  cy="32"  r="3"   fill="#3dbb6e"/>

  <!-- Conexiones capa 3 → 4 -->
  <line x1="100" y1="48"  x2="100" y2="26"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="130" y1="56"  x2="138" y2="36"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="152" y1="78"  x2="168" y2="62"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="152" y1="108" x2="174" y2="100" stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="136" y1="140" x2="160" y2="140" stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="108" y1="155" x2="130" y2="168" stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="76"  y1="152" x2="90"  y2="176" stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="50"  y1="134" x2="52"  y2="164" stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="46"  y1="104" x2="24"  y2="98"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="54"  y1="72"  x2="40"  y2="60"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="76"  y1="52"  x2="66"  y2="32"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>

  <!-- Brote emergiendo del centro hacia arriba -->
  <line x1="100" y1="82" x2="100" y2="48" stroke="#3dbb6e" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M100 60 C100 60 87 52 84 42 C90 48 100 52 100 60Z" fill="#3dbb6e" opacity="0.9"/>
  <path d="M100 55 C100 55 113 47 116 37 C110 43 100 47 100 55Z" fill="#3dbb6e" opacity="0.9"/>
</svg>
