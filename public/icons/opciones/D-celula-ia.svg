<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#080f1e"/>

  <!-- Membrana celular (forma orgánica irregular) -->
  <path d="M100 22 C130 20 158 40 168 68 C178 96 170 130 148 152
           C126 174 86 178 62 162 C38 146 24 116 28 88
           C32 60 56 30 76 24 C84 21 92 22 100 22Z"
        fill="#0a1e0f" stroke="#3dbb6e" stroke-width="2" opacity="0.85"/>

  <!-- Orgánulos como nodos — distribuidos de forma orgánica -->
  <!-- Mitocondrias (elongadas, doradas) -->
  <ellipse cx="52"  cy="80"  rx="12" ry="6"  fill="#1a3a1a" stroke="#e2b04a" stroke-width="1.5" transform="rotate(-25 52 80)"/>
  <ellipse cx="152" cy="90"  rx="12" ry="6"  fill="#1a3a1a" stroke="#e2b04a" stroke-width="1.5" transform="rotate(20 152 90)"/>
  <ellipse cx="70"  cy="158" rx="10" ry="5"  fill="#1a3a1a" stroke="#e2b04a" stroke-width="1.5" transform="rotate(15 70 158)"/>
  <ellipse cx="140" cy="145" rx="10" ry="5"  fill="#1a3a1a" stroke="#e2b04a" stroke-width="1.5" transform="rotate(-30 140 145)"/>

  <!-- Ribosomas (puntos pequeños verdes) -->
  <circle cx="44"  cy="110" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="156" cy="120" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="90"  cy="168" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="116" cy="52"  r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="58"  cy="140" r="2.5" fill="#3dbb6e" opacity="0.7"/>
  <circle cx="148" cy="60"  r="2.5" fill="#3dbb6e" opacity="0.7"/>
  <circle cx="35"  cy="96"  r="2.5" fill="#3dbb6e" opacity="0.6"/>
  <circle cx="164" cy="108" r="2.5" fill="#3dbb6e" opacity="0.6"/>
  <circle cx="110" cy="170" r="2.5" fill="#3dbb6e" opacity="0.6"/>
  <circle cx="82"  cy="36"  r="2.5" fill="#3dbb6e" opacity="0.6"/>

  <!-- Retículo endoplasmático (líneas curvas) -->
  <path d="M64 62 C75 55 85 70 80 80 C75 90 85 100 80 110" stroke="#3dbb6e" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4 3"/>
  <path d="M136 152 C145 143 142 130 148 120 C154 110 150 100 145 90" stroke="#3dbb6e" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="4 3"/>

  <!-- Conexiones (citoesqueleto = red) -->
  <line x1="52"  y1="80"  x2="100" y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.4"/>
  <line x1="152" y1="90"  x2="100" y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.4"/>
  <line x1="70"  y1="158" x2="100" y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.35"/>
  <line x1="140" y1="145" x2="100" y2="100" stroke="#3dbb6e" stroke-width="1.2" opacity="0.35"/>
  <line x1="44"  cy="110" x2="52"  y2="80"  stroke="#3dbb6e" stroke-width="1"   opacity="0.3"/>
  <line x1="52"  y1="80"  x2="116" y2="52"  stroke="#e2b04a" stroke-width="1"   opacity="0.3"/>
  <line x1="152" y1="90"  x2="148" y2="60"  stroke="#e2b04a" stroke-width="1"   opacity="0.3"/>
  <line x1="70"  y1="158" x2="44"  y2="110" stroke="#e2b04a" stroke-width="1"   opacity="0.3"/>
  <line x1="140" y1="145" x2="164" y2="108" stroke="#e2b04a" stroke-width="1"   opacity="0.3"/>

  <!-- Núcleo (centro) con "IA" -->
  <circle cx="100" cy="100" r="30"  fill="#0d2a1a" stroke="#e2b04a" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="24"  fill="#081510" stroke="#3dbb6e"  stroke-width="1" opacity="0.5"/>
  <!-- Nucléolo (punto dorado) -->
  <circle cx="100" cy="100" r="8"   fill="#e2b04a" opacity="0.15"/>
  <text x="100" y="106" font-family="Arial, sans-serif" font-size="15" font-weight="bold"
        text-anchor="middle" fill="#e2b04a" letter-spacing="1">IA</text>

  <!-- Poros nucleares (pequeños puntos en el borde del núcleo) -->
  <circle cx="100" cy="70"  r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="121" cy="79"  r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="128" cy="102" r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="118" cy="124" r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="96"  cy="130" r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="76"  cy="120" r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="70"  cy="98"  r="2.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="80"  cy="78"  r="2.5" fill="#e2b04a" opacity="0.7"/>
</svg>
