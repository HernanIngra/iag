  <line x1="100" y1="40" x2="92" y2="30" stroke="#3dbb6e" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="40" x2="108" y2="30" stroke="#3dbb6e" stroke-width="2" stroke-linecap="round"/>
  <!-- Hoja lateral -->
  <path d="M100 140 C100 140 75 130 68 115 C75 125 100 130 100 140Z" fill="#3dbb6e"/>
  <path d="M100 115 C100 115 125 105 132 90 C125 100 100 105 100 115Z" fill="#3dbb6e"/>
