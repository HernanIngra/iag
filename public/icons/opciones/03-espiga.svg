  <ellipse cx="84" cy="148" rx="14" ry="9" fill="#e2b04a" transform="rotate(-35 84 148)"/>
  <ellipse cx="116" cy="148" rx="14" ry="9" fill="#e2b04a" transform="rotate(35 116 148)"/>
  <!-- Par 2 -->
  <ellipse cx="80" cy="128" rx="14" ry="9" fill="#e2b04a" transform="rotate(-35 80 128)"/>
  <ellipse cx="120" cy="128" rx="14" ry="9" fill="#e2b04a" transform="rotate(35 120 128)"/>
  <!-- Par 3 -->
  <ellipse cx="77" cy="108" rx="14" ry="9" fill="#e2b04a" transform="rotate(-35 77 108)"/>
  <ellipse cx="123" cy="108" rx="14" ry="9" fill="#e2b04a" transform="rotate(35 123 108)"/>
  <!-- Par 4 -->
  <ellipse cx="78" cy="88" rx="13" ry="8" fill="#e2b04a" transform="rotate(-35 78 88)"/>
  <ellipse cx="122" cy="88" rx="13" ry="8" fill="#e2b04a" transform="rotate(35 122 88)"/>
  <!-- Par 5 -->
  <ellipse cx="82" cy="70" rx="11" ry="7" fill="#e2b04a" transform="rotate(-35 82 70)"/>
