<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#0d1b35"/>
  <!-- Línea divisoria suelo -->
  <line x1="24" y1="105" x2="176" y2="105" stroke="#1e3a5a" stroke-width="1.5" stroke-dasharray="4 4"/>
  <!-- PARTE SUPERIOR: Planta -->
  <!-- Tallo -->
  <line x1="100" y1="105" x2="100" y2="42" stroke="#3dbb6e" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hojas -->
  <path d="M100 75 C100 75 78 65 72 50 C82 58 100 65 100 75Z" fill="#3dbb6e"/>
  <path d="M100 60 C100 60 122 50 128 35 C118 43 100 50 100 60Z" fill="#3dbb6e"/>
  <!-- Flor/brote arriba -->
  <circle cx="100" cy="36" r="10" fill="#e2b04a"/>
  <circle cx="88" cy="30" r="5" fill="#e2b04a"/>
  <circle cx="112" cy="30" r="5" fill="#e2b04a"/>
  <circle cx="100" cy="36" r="5" fill="#0d1b35"/>
  <!-- PARTE INFERIOR: Red de raíces = red neuronal -->
  <!-- Nodo raíz central -->
  <circle cx="100" cy="120" r="5" fill="#e2b04a"/>
  <!-- Ramificación 1er nivel -->
  <line x1="100" y1="120" x2="70" y2="138" stroke="#e2b04a" stroke-width="2" stroke-linecap="round"/>
