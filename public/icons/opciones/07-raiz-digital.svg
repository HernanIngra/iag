  <!-- Ramificación 3er nivel -->
  <line x1="48" y1="155" x2="36" y2="172" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="48" y1="155" x2="58" y2="174" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="158" x2="72" y2="174" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="158" x2="90" y2="175" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="120" y1="158" x2="110" y2="175" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="120" y1="158" x2="128" y2="174" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="152" y1="155" x2="142" y2="174" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="152" y1="155" x2="164" y2="172" stroke="#e2b04a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Nodos finales -->
  <circle cx="36" cy="172" r="2.5" fill="#e2b04a" opacity="0.6"/>
  <circle cx="58" cy="174" r="2.5" fill="#e2b04a" opacity="0.6"/>
  <circle cx="72" cy="174" r="2.5" fill="#e2b04a" opacity="0.6"/>
  <circle cx="90" cy="175" r="2.5" fill="#e2b04a" opacity="0.6"/>
  <circle cx="110" cy="175" r="2.5" fill="#e2b04a" opacity="0.6"/>
