  <line x1="70" y1="138" x2="80" y2="158" stroke="#e2b04a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="48" cy="155" r="3.5" fill="#3dbb6e"/>
  <circle cx="80" cy="158" r="3.5" fill="#3dbb6e"/>
