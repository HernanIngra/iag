<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#080f1e"/>

  <!-- Resplandores suaves de fondo -->
  <circle cx="100" cy="95" r="55" fill="#0d2a18" opacity="0.6"/>
  <circle cx="100" cy="95" r="35" fill="#0a1e12" opacity="0.5"/>

  <!-- === RAÍCES (red abajo) === -->
  <!-- Nodo raíz central -->
  <circle cx="100" cy="165" r="5" fill="#3dbb6e"/>
  <!-- Raíz izquierda 1 -->
  <line x1="100" y1="165" x2="72"  y2="178" stroke="#3dbb6e" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="72"  cy="178" r="3"   fill="#3dbb6e" opacity="0.7"/>
  <!-- Raíz derecha 1 -->
  <line x1="100" y1="165" x2="128" y2="178" stroke="#3dbb6e" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="128" cy="178" r="3"   fill="#3dbb6e" opacity="0.7"/>
  <!-- Raíz izquierda 2 -->
  <line x1="72"  y1="178" x2="52"  y2="188" stroke="#3dbb6e" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="52"  cy="188" r="2.5" fill="#3dbb6e" opacity="0.5"/>
  <line x1="72"  y1="178" x2="80"  y2="190" stroke="#3dbb6e" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="80"  cy="190" r="2.5" fill="#3dbb6e" opacity="0.5"/>
  <!-- Raíz derecha 2 -->
  <line x1="128" y1="178" x2="148" y2="188" stroke="#3dbb6e" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="148" cy="188" r="2.5" fill="#3dbb6e" opacity="0.5"/>
  <line x1="128" y1="178" x2="120" y2="190" stroke="#3dbb6e" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="120" cy="190" r="2.5" fill="#3dbb6e" opacity="0.5"/>

  <!-- === TALLO PRINCIPAL === -->
  <line x1="100" y1="165" x2="100" y2="50" stroke="#3dbb6e" stroke-width="3" stroke-linecap="round"/>

  <!-- === HOJAS LATERALES (compuestas de nodos) === -->
  <!-- Hoja izquierda inferior -->
  <line x1="100" y1="140" x2="64"  y2="128" stroke="#3dbb6e" stroke-width="1.8"/>
  <line x1="64"  y1="128" x2="40"  y2="132" stroke="#3dbb6e" stroke-width="1.5" opacity="0.7"/>
  <line x1="64"  y1="128" x2="52"  y2="116" stroke="#3dbb6e" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="140" r="4"   fill="#3dbb6e"/>
  <circle cx="64"  cy="128" r="4"   fill="#e2b04a"/>
  <circle cx="40"  cy="132" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="52"  cy="116" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <!-- Conexión entre puntas de hoja izquierda -->
  <line x1="40" y1="132" x2="52" y2="116" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>

  <!-- Hoja derecha inferior -->
  <line x1="100" y1="140" x2="136" y2="128" stroke="#3dbb6e" stroke-width="1.8"/>
  <line x1="136" y1="128" x2="160" y2="132" stroke="#3dbb6e" stroke-width="1.5" opacity="0.7"/>
  <line x1="136" y1="128" x2="148" y2="116" stroke="#3dbb6e" stroke-width="1.5" opacity="0.7"/>
  <circle cx="136" cy="128" r="4"   fill="#e2b04a"/>
  <circle cx="160" cy="132" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="148" cy="116" r="3"   fill="#3dbb6e" opacity="0.8"/>
  <line x1="160" y1="132" x2="148" y2="116" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>

  <!-- Hoja izquierda media -->
  <line x1="100" y1="108" x2="60"  y2="94"  stroke="#3dbb6e" stroke-width="1.8"/>
  <line x1="60"  y1="94"  x2="34"  y2="96"  stroke="#3dbb6e" stroke-width="1.4" opacity="0.7"/>
  <line x1="60"  y1="94"  x2="44"  y2="80"  stroke="#3dbb6e" stroke-width="1.4" opacity="0.7"/>
  <line x1="34"  y1="96"  x2="44"  y2="80"  stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <circle cx="100" cy="108" r="4"   fill="#3dbb6e"/>
  <circle cx="60"  cy="94"  r="4"   fill="#e2b04a"/>
  <circle cx="34"  cy="96"  r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="44"  cy="80"  r="3"   fill="#3dbb6e" opacity="0.8"/>

  <!-- Hoja derecha media -->
  <line x1="100" y1="108" x2="140" y2="94"  stroke="#3dbb6e" stroke-width="1.8"/>
  <line x1="140" y1="94"  x2="166" y2="96"  stroke="#3dbb6e" stroke-width="1.4" opacity="0.7"/>
  <line x1="140" y1="94"  x2="156" y2="80"  stroke="#3dbb6e" stroke-width="1.4" opacity="0.7"/>
  <line x1="166" y1="96"  x2="156" y2="80"  stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <circle cx="140" cy="94"  r="4"   fill="#e2b04a"/>
  <circle cx="166" cy="96"  r="3"   fill="#3dbb6e" opacity="0.8"/>
  <circle cx="156" cy="80"  r="3"   fill="#3dbb6e" opacity="0.8"/>

  <!-- Hoja izquierda alta -->
  <line x1="100" y1="76"  x2="68"  y2="62"  stroke="#3dbb6e" stroke-width="1.6"/>
  <line x1="68"  y1="62"  x2="48"  y2="60"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.7"/>
  <line x1="68"  y1="62"  x2="56"  y2="48"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.7"/>
  <circle cx="100" cy="76"  r="3.5" fill="#3dbb6e"/>
  <circle cx="68"  cy="62"  r="3.5" fill="#e2b04a"/>
  <circle cx="48"  cy="60"  r="2.5" fill="#3dbb6e" opacity="0.8"/>
  <circle cx="56"  cy="48"  r="2.5" fill="#3dbb6e" opacity="0.8"/>

  <!-- Hoja derecha alta -->
  <line x1="100" y1="76"  x2="132" y2="62"  stroke="#3dbb6e" stroke-width="1.6"/>
  <line x1="132" y1="62"  x2="152" y2="60"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.7"/>
  <line x1="132" y1="62"  x2="144" y2="48"  stroke="#3dbb6e" stroke-width="1.3" opacity="0.7"/>
  <circle cx="132" cy="62"  r="3.5" fill="#e2b04a"/>
  <circle cx="152" cy="60"  r="2.5" fill="#3dbb6e" opacity="0.8"/>
  <circle cx="144" cy="48"  r="2.5" fill="#3dbb6e" opacity="0.8"/>

  <!-- === FLOR / CORONA (punta) === -->
  <circle cx="100" cy="44"  r="6"   fill="#e2b04a"/>
  <circle cx="100" cy="32"  r="4"   fill="#e2b04a" opacity="0.8"/>
  <circle cx="88"  cy="38"  r="3.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="112" cy="38"  r="3.5" fill="#e2b04a" opacity="0.7"/>
  <circle cx="84"  cy="50"  r="3"   fill="#e2b04a" opacity="0.6"/>
  <circle cx="116" cy="50"  r="3"   fill="#e2b04a" opacity="0.6"/>
  <line x1="100" y1="50"  x2="100" y2="32"  stroke="#e2b04a" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="44"  x2="88"  y2="38"  stroke="#e2b04a" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="44"  x2="112" y2="38"  stroke="#e2b04a" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="44"  x2="84"  y2="50"  stroke="#e2b04a" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="44"  x2="116" y2="50"  stroke="#e2b04a" stroke-width="1.2" opacity="0.4"/>

  <!-- Nodos del tallo -->
  <circle cx="100" cy="50"  r="3"   fill="#3dbb6e"/>
  <circle cx="100" cy="165" r="5"   fill="#3dbb6e"/>
</svg>
