<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#080f1e"/>

  <!-- Fondo: campo con surcos suaves -->
  <line x1="20" y1="155" x2="180" y2="155" stroke="#0f2e12" stroke-width="5"/>
  <line x1="20" y1="165" x2="180" y2="165" stroke="#0f2e12" stroke-width="5"/>
  <line x1="20" y1="175" x2="180" y2="175" stroke="#0f2e12" stroke-width="5"/>
  <line x1="20" y1="145" x2="180" y2="145" stroke="#0f2e12" stroke-width="4"/>

  <!-- Horizonte sutil -->
  <line x1="20" y1="140" x2="180" y2="140" stroke="#1a3a1a" stroke-width="1.5" opacity="0.6"/>

  <!-- === CONSTELACIÓN VEGETAL (cielo nocturno con nodos) === -->
  <!-- Forma de hoja/planta hecha de estrellas/nodos conectados -->

  <!-- Nodos principales (estrellas brillantes) -->
  <circle cx="100" cy="30"  r="5"   fill="#e2b04a"/>
  <circle cx="72"  cy="55"  r="4"   fill="#e2b04a"/>
  <circle cx="128" cy="55"  r="4"   fill="#e2b04a"/>
  <circle cx="55"  cy="85"  r="4.5" fill="#3dbb6e"/>
  <circle cx="100" cy="78"  r="3.5" fill="#e2b04a"/>
  <circle cx="145" cy="85"  r="4.5" fill="#3dbb6e"/>
  <circle cx="40"  cy="112" r="3.5" fill="#3dbb6e"/>
  <circle cx="80"  cy="105" r="3.5" fill="#e2b04a"/>
  <circle cx="120" cy="105" r="3.5" fill="#e2b04a"/>
  <circle cx="160" cy="112" r="3.5" fill="#3dbb6e"/>
  <circle cx="100" cy="118" r="4.5" fill="#e2b04a"/>
  <circle cx="64"  cy="130" r="3"   fill="#3dbb6e"/>
  <circle cx="136" cy="130" r="3"   fill="#3dbb6e"/>

  <!-- Nodos secundarios (estrellas tenues) -->
  <circle cx="88"  cy="42"  r="2.5" fill="#3dbb6e" opacity="0.8"/>
  <circle cx="112" cy="42"  r="2.5" fill="#3dbb6e" opacity="0.8"/>
  <circle cx="60"  cy="70"  r="2"   fill="#e2b04a" opacity="0.7"/>
  <circle cx="140" cy="70"  r="2"   fill="#e2b04a" opacity="0.7"/>
  <circle cx="100" cy="50"  r="2"   fill="#3dbb6e" opacity="0.6"/>
  <circle cx="32"  cy="95"  r="2"   fill="#e2b04a" opacity="0.6"/>
  <circle cx="168" cy="95"  r="2"   fill="#e2b04a" opacity="0.6"/>
  <circle cx="48"  cy="130" r="2"   fill="#e2b04a" opacity="0.6"/>
  <circle cx="152" cy="130" r="2"   fill="#e2b04a" opacity="0.6"/>

  <!-- Líneas de constelación (la red) -->
  <!-- Columna vertebral -->
  <line x1="100" y1="30"  x2="88"  y2="42"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="30"  x2="112" y2="42"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="88"  y1="42"  x2="72"  y2="55"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="112" y1="42"  x2="128" y2="55"  stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="30"  x2="100" y2="50"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="100" y1="50"  x2="100" y2="78"  stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <line x1="72"  y1="55"  x2="60"  y2="70"  stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="128" y1="55"  x2="140" y2="70"  stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="60"  y1="70"  x2="55"  y2="85"  stroke="#3dbb6e" stroke-width="1.1" opacity="0.5"/>
  <line x1="140" y1="70"  x2="145" y2="85"  stroke="#3dbb6e" stroke-width="1.1" opacity="0.5"/>
  <line x1="55"  y1="85"  x2="40"  y2="112" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <line x1="145" y1="85"  x2="160" y2="112" stroke="#3dbb6e" stroke-width="1.2" opacity="0.5"/>
  <line x1="55"  y1="85"  x2="80"  y2="105" stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="145" y1="85"  x2="120" y2="105" stroke="#e2b04a" stroke-width="1.1" opacity="0.45"/>
  <line x1="100" y1="78"  x2="80"  y2="105" stroke="#e2b04a" stroke-width="1.1" opacity="0.4"/>
  <line x1="100" y1="78"  x2="120" y2="105" stroke="#e2b04a" stroke-width="1.1" opacity="0.4"/>
  <line x1="80"  y1="105" x2="100" y2="118" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="120" y1="105" x2="100" y2="118" stroke="#e2b04a" stroke-width="1.2" opacity="0.5"/>
  <line x1="40"  y1="112" x2="32"  y2="95"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="160" y1="112" x2="168" y2="95"  stroke="#3dbb6e" stroke-width="1"   opacity="0.4"/>
  <line x1="40"  y1="112" x2="64"  y2="130" stroke="#3dbb6e" stroke-width="1.1" opacity="0.4"/>
  <line x1="160" y1="112" x2="136" y2="130" stroke="#3dbb6e" stroke-width="1.1" opacity="0.4"/>
  <line x1="100" y1="118" x2="64"  y2="130" stroke="#e2b04a" stroke-width="1"   opacity="0.35"/>
  <line x1="100" y1="118" x2="136" y2="130" stroke="#e2b04a" stroke-width="1"   opacity="0.35"/>
  <line x1="64"  y1="130" x2="48"  y2="130" stroke="#3dbb6e" stroke-width="1"   opacity="0.35"/>
  <line x1="136" y1="130" x2="152" y2="130" stroke="#3dbb6e" stroke-width="1"   opacity="0.35"/>

  <!-- Destello en el nodo central superior -->
  <circle cx="100" cy="30" r="9" stroke="#e2b04a" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- Líneas de destello (tipo estrella) -->
  <line x1="100" y1="20"  x2="100" y2="16"  stroke="#e2b04a" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="109" y1="21"  x2="112" y2="18"  stroke="#e2b04a" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="91"  y1="21"  x2="88"  y2="18"  stroke="#e2b04a" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Planta emergiendo en el horizonte (muy simple) -->
  <line x1="100" y1="140" x2="100" y2="118" stroke="#3dbb6e" stroke-width="2.5" stroke-linecap="round"/>
</svg>
