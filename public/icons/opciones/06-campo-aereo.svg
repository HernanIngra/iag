<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="38" fill="#0d1b35"/>
  <!-- Vista aérea de campo: curvas de nivel / surcos -->
  <!-- Horizonte -->
  <rect x="20" y="108" width="160" height="72" rx="4" fill="#0f2545"/>
  <!-- Surcos del campo (parte inferior) -->
  <line x1="20" y1="120" x2="180" y2="120" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <line x1="20" y1="130" x2="180" y2="130" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <line x1="20" y1="140" x2="180" y2="140" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <line x1="20" y1="150" x2="180" y2="150" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <line x1="20" y1="160" x2="180" y2="160" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <line x1="20" y1="170" x2="180" y2="170" stroke="#3dbb6e" stroke-width="2.5" opacity="0.7"/>
  <!-- Perspectiva convergente - líneas verticales del campo -->
  <line x1="40" y1="108" x2="40" y2="180" stroke="#1e4a2e" stroke-width="6"/>
  <line x1="68" y1="108" x2="68" y2="180" stroke="#1e4a2e" stroke-width="6"/>
  <line x1="96" y1="108" x2="96" y2="180" stroke="#1e4a2e" stroke-width="6"/>
  <line x1="124" y1="108" x2="124" y2="180" stroke="#1e4a2e" stroke-width="6"/>
  <line x1="152" y1="108" x2="152" y2="180" stroke="#1e4a2e" stroke-width="6"/>
  <!-- Cielo / parte superior con datos -->
  <rect x="20" y="22" width="160" height="80" rx="4" fill="#0f2545"/>
  <!-- "Pantalla" de datos superpuesta -->
  <rect x="30" y="30" width="50" height="30" rx="4" fill="#1a3a5c" stroke="#e2b04a" stroke-width="1.5"/>
  <line x1="36" y1="42" x2="74" y2="42" stroke="#3dbb6e" stroke-width="2"/>
  <line x1="36" y1="50" x2="60" y2="50" stroke="#3dbb6e" stroke-width="2" opacity="0.6"/>
  <text x="55" y="40" font-family="monospace" font-size="9" fill="#e2b04a">14.2 t</text>
  <!-- Gráfico de barras mini -->
  <rect x="100" y="30" width="70" height="34" rx="4" fill="#1a3a5c" stroke="#e2b04a" stroke-width="1.5"/>
  <rect x="108" y="50" width="8" height="10" rx="1" fill="#3dbb6e"/>
  <rect x="120" y="44" width="8" height="16" rx="1" fill="#e2b04a"/>
  <rect x="132" y="48" width="8" height="12" rx="1" fill="#3dbb6e"/>
  <rect x="144" y="38" width="8" height="22" rx="1" fill="#e2b04a"/>
  <rect x="156" y="45" width="8" height="15" rx="1" fill="#3dbb6e"/>
  <!-- Divisor horizonte -->
  <line x1="20" y1="108" x2="180" y2="108" stroke="#e2b04a" stroke-width="2.5"/>
  <!-- Pin GPS -->
  <circle cx="100" cy="108" r="6" fill="#e2b04a"/>
</svg>
